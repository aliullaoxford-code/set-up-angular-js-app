name: Build Angular app
on:
  push:
    branch: [ main ]

jobs:
  build-angular-app:
  runs-on: ubuntu-latest

  steps:
    -uses: actions/checkout@v6.0.2
    -name: set up nodejs
    uses: actions/setup-node@v6.3.0
    with:
    node-version:

    -name: Install dependencies
      run: npm install
    -name: Build Angular app
      run: npm run build





    
